name: TABI checks

on:
  push:
    branches:
      - main
      - codex-tabi-site-foundation
  pull_request:

jobs:
  check:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run site checks
        run: npm run check

      - name: Print maintenance report
        run: npm run report
